name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: cp data/config.github.json data/config.json
      - name: Fetch China hot topics
        run: uv run python scripts/china_hot_fetcher.py
      - name: Run Horizon
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run horizon --hours 48
      - name: Rewrite as Douyin scripts
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: uv run python scripts/douyin_rewriter.py
      - run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "Daily: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
